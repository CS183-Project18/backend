server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

spring:
  application:
    name: unique-finds-backend
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: ${fuzhou.datasource.driver-class-name}
    url: jdbc:mysql://${fuzhou.datasource.host}:${fuzhou.datasource.port}/${fuzhou.datasource.database}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${fuzhou.datasource.username}
    password: ${fuzhou.datasource.password}
  mail:
    host: ${fuzhou.mail.host}
    username: ${fuzhou.mail.username}
    password: ${fuzhou.mail.password}
    default-encoding: ${fuzhou.mail.default-encoding}
    port: 465
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
      imap:
        ssl:
          socketFactory:
            fallback: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.storefinds.uniquefindsbackend.entity
  configuration:
    map-underscore-to-camel-case: true

fuzhou:
  jwt:
    user-secret-key: ${fuzhou.jwt.user-secret-key}
    user-ttl: 7200
    user-token-name: token
    refresh-secret-key: ${fuzhou.jwt.refresh-secret-key}
    refresh-ttl: 86400000

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${fuzhou.jwt.user-secret-key}
    expire-seconds: ${fuzhou.jwt.user-ttl}
  auth:
    debug-code-response: true
  mail:
    mock: false
  storage:
    image-dir: uploads/images
    max-image-size: 5242880
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    semantic-path: /api/search/semantic
    multimodal-path: /api/search/multimodal

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: Unique Finds Backend
    stage: demo
